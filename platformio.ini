; TopBand BMS Gateway - PlatformIO configuration
; Targets: Waveshare ESP32-S3 RS485/CAN Controller (primary), LilyGo T-CAN485 (secondary)
;
; Build environments:
;   esp32s3        - production build, upload via USB
;   esp32s3_ota    - production build, upload via OTA over WiFi
;   esp32s3_debug  - debug build with ESP-IDF verbose logging
;   native         - host-side unit tests (no hardware required)
;
; Common commands:
;   pio run                              -> compile default env (esp32s3)
;   pio run -e esp32s3 -t upload         -> USB flash
;   pio run -e esp32s3_ota -t upload \
;       --upload-port 192.168.1.x        -> OTA flash
;   pio device monitor                   -> serial console
;   pio test -e native                   -> run host unit tests
;   pio check                            -> static analysis
;   pio run -t uploadfs                  -> upload LittleFS image (data/ folder)

[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test
data_dir = data                          ; LittleFS image source

; ----------------------------------------------------------------------------
; Shared configuration (inherited by all ESP32-S3 environments)
; ----------------------------------------------------------------------------
[env]
platform = espressif32@^6.7.0            ; pin platform, do not auto-upgrade
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter                ; Arduino callbacks often ignore args
    -Wno-missing-field-initializers
    -DCORE_DEBUG_LEVEL=3                 ; 0=none 1=err 2=warn 3=info 4=debug 5=verbose
    -DARDUINOJSON_USE_LONG_LONG=1
    -DARDUINOJSON_ENABLE_NAN=0
    -DARDUINOJSON_ENABLE_INFINITY=0

build_unflags =
    -std=gnu++11

; Shared library dependencies. Pin versions so the build is reproducible.
lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    knolleary/PubSubClient@^2.8
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    ; mathieucarbou/AsyncTCP@^3.2.10     ; pulled in as dependency
    adafruit/Adafruit NeoPixel@^1.12.3
    me-no-dev/ESP Async WebServer@^1.2.4  ; fallback, pick one of the two

check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=warning,style,performance --suppress=missingIncludeSystem --inline-suppr
    clangtidy: --checks=-*,bugprone-*,performance-*,readability-*,modernize-*,-modernize-use-trailing-return-type

; ----------------------------------------------------------------------------
; Production build, USB upload
; ----------------------------------------------------------------------------
[env:esp32s3]
board = esp32-s3-devkitc-1
board_build.partitions = partitions.csv   ; custom partition with LittleFS
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi ; 8 MB flash, QIO OPI PSRAM off
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 8MB

build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_S3
    -DFW_VERSION=\"3.0.0-dev\"

; Expose git SHA at build time. tools/git_sha_gen.sh writes include/git_sha.h
extra_scripts = pre:tools/git_sha_gen.py

; ----------------------------------------------------------------------------
; Production build, OTA upload
; ----------------------------------------------------------------------------
[env:esp32s3_ota]
extends = env:esp32s3
upload_protocol = espota
upload_port = topband-gateway.local       ; resolved via mDNS; or override on CLI
upload_flags =
    --auth=                               ; set via CLI or environment variable
    --port=3232

; ----------------------------------------------------------------------------
; Debug build with verbose ESP-IDF logging and assertions
; ----------------------------------------------------------------------------
[env:esp32s3_debug]
extends = env:esp32s3
build_type = debug
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_S3
    -DFW_VERSION=\"3.0.0-debug\"
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -g3
    -ggdb

; ----------------------------------------------------------------------------
; Secondary board: LilyGo T-CAN485 with SD card
; ----------------------------------------------------------------------------
[env:lilygo_tcan485]
extends = env:esp32s3
build_flags =
    ${env.build_flags}
    -DBOARD_LILYGO_TCAN485
    -DFW_VERSION=\"3.0.0-dev\"

; ----------------------------------------------------------------------------
; Host-side unit tests (no hardware, runs on developer machine and in CI)
; ----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DUNIT_TEST
    -DNATIVE_BUILD
; Do NOT inherit Arduino-specific lib_deps here; they won't build on host.
lib_deps =
    bblanchon/ArduinoJson@^7.1.0
test_build_src = yes
test_ignore = embedded/*                  ; embedded tests run on device only

; ----------------------------------------------------------------------------
; On-device integration tests (flashes test runner to hardware)
; ----------------------------------------------------------------------------
[env:test_esp32s3]
extends = env:esp32s3
test_framework = unity
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_S3
    -DUNIT_TEST
    -DON_DEVICE_TEST
test_ignore = native/*
